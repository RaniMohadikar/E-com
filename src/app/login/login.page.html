<ion-content class="white-bg">

  <div class="login-wrap">

    <!-- Logo & Branding -->
    <div class="brand-section">
      <div class="brand-logo">
        <ion-icon name="bag-handle" class="brand-icon"></ion-icon>
      </div>
      <h1 class="brand-name">ShopEasy</h1>
      <p class="brand-sub">Your one-stop shopping destination</p>
    </div>

    <!-- Welcome Text -->
    <div class="welcome-section">
      <h2 class="welcome-title">Welcome Back!</h2>
      <p class="welcome-sub">Sign in to continue to your account</p>
    </div>

    <form [formGroup]="loginForm">

      <!-- Email Field -->
      <div class="input-group">
        <div class="input-label">Email Address</div>
        <div class="input-wrap" [class.invalid]="valSubmit && loginForm.controls['email'].invalid">
          <ion-icon name="mail-outline" class="field-icon"></ion-icon>
          <ion-input
            type="email"
            placeholder="Enter your email"
            formControlName="email"
          ></ion-input>
        </div>
        <p class="field-error" *ngIf="valSubmit && loginForm.controls['email'].invalid">
          Please enter a valid email
        </p>
      </div>

      <!-- Password Field -->
      <div class="input-group">
        <div class="input-label">Password</div>
        <div class="input-wrap" [class.invalid]="valSubmit && loginForm.controls['password'].invalid">
          <ion-icon name="lock-closed-outline" class="field-icon"></ion-icon>
          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter your password"
            formControlName="password"
          ></ion-input>
          <ion-icon
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
            (click)="togglePassword()"
            class="eye-icon"
          ></ion-icon>
        </div>
        <p class="field-error" *ngIf="valSubmit && loginForm.controls['password'].invalid">
          Password is required
        </p>
      </div>

      <!-- Forgot Password -->
      <div class="forgot-row">
        <span class="forgot-link">Forgot Password?</span>
      </div>

      <!-- Error Message -->
      <div class="login-error" *ngIf="loginError">
        <ion-icon name="alert-circle-outline"></ion-icon>
        {{ loginError }}
      </div>

      <!-- Sign In Button -->
      <ion-button expand="block" class="sign-in-btn" (click)="login()">
        Sign In
        <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>

    </form>

    <!-- Divider -->
    <div class="or-divider">
      <span class="divider-line"></span>
      <span class="divider-text">Or sign in with</span>
      <span class="divider-line"></span>
    </div>

    <!-- Social Buttons -->
    <div class="social-row">
      <button class="social-btn">
        <img src="/assets/google.png" alt="Google" style="height:22px;">
      </button>
      <button class="social-btn">
        <img src="/assets/fb.png" alt="Facebook" style="height:22px;">
      </button>
      <button class="social-btn">
        <img src="/assets/git.png" alt="GitHub" style="height:22px;">
      </button>
    </div>

    <!-- Register Link -->
    <div class="register-row">
      <span class="reg-text">Don't have an account?</span>
      <a routerLink="/registration" class="reg-link">Create Account</a>
    </div>

  </div>

</ion-content>
